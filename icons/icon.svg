<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="penGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sparkleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fef3c7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fde68a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background rounded square -->
  <rect x="8" y="8" width="112" height="112" rx="24" fill="url(#bgGradient)"/>
  
  <!-- Document/Script Pages with depth -->
  <g transform="translate(28, 32)">
    <!-- Back page -->
    <rect x="8" y="8" width="56" height="64" rx="4" fill="#ffffff" opacity="0.3"/>
    
    <!-- Middle page -->
    <rect x="4" y="4" width="56" height="64" rx="4" fill="#ffffff" opacity="0.5"/>
    
    <!-- Front page with script lines -->
    <rect x="0" y="0" width="56" height="64" rx="4" fill="#ffffff"/>
    
    <!-- Script lines -->
    <line x1="8" y1="12" x2="48" y2="12" stroke="#6366f1" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <line x1="8" y1="20" x2="42" y2="20" stroke="#6366f1" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <line x1="8" y1="28" x2="46" y2="28" stroke="#6366f1" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
    <line x1="8" y1="36" x2="38" y2="36" stroke="#6366f1" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
    <line x1="8" y1="44" x2="44" y2="44" stroke="#6366f1" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
    <line x1="8" y1="52" x2="40" y2="52" stroke="#6366f1" stroke-width="2" stroke-linecap="round" opacity="0.2"/>
  </g>
  
  <!-- AI Pen writing (rotated) -->
  <g transform="translate(68, 58) rotate(-45)">
    <!-- Pen body -->
    <rect x="0" y="0" width="8" height="32" rx="2" fill="url(#penGradient)"/>
    <rect x="0" y="0" width="8" height="8" rx="2" fill="#fef3c7"/>
    <!-- Pen tip -->
    <polygon points="4,32 0,38 8,38" fill="#92400e"/>
  </g>
  
  <!-- AI Sparkles indicating intelligence -->
  <g opacity="0.9">
    <!-- Top right sparkle -->
    <path d="M 98 28 L 100 32 L 98 36 L 94 32 Z" fill="url(#sparkleGradient)"/>
    <circle cx="98" cy="32" r="2" fill="#fef3c7"/>
    
    <!-- Bottom left sparkle -->
    <path d="M 38 88 L 40 92 L 38 96 L 34 92 Z" fill="url(#sparkleGradient)"/>
    <circle cx="38" cy="92" r="2" fill="#fef3c7"/>
    
    <!-- Small top sparkle -->
    <path d="M 88 18 L 89 20 L 88 22 L 86 20 Z" fill="#fde68a"/>
  </g>
  
  <!-- Subtle border highlight -->
  <rect x="8" y="8" width="112" height="112" rx="24" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.2"/>
</svg>
