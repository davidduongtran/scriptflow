<!DOCTYPE html>
<html>

<head>
    <title>FinRich Keep-Alive</title>
</head>

<body>
    <!-- 
    Offscreen Document for FinRich Script
    This hidden document helps keep the service worker alive by maintaining an active context.
    It performs a simple ping every 20 seconds.
  -->
    <script>
        // Ping the service worker periodically to help keep it alive
        setInterval(() => {
            chrome.runtime.sendMessage({ action: 'offscreenPing' }, (response) => {
                if (chrome.runtime.lastError) {
                    // Service worker may have restarted, that's OK
                }
            });
        }, 20000); // Every 20 seconds

        console.log('🔌 Offscreen keep-alive document active');
    </script>
</body>

</html>
