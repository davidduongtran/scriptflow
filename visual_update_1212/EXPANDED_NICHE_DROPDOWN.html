<!-- ═══════════════════════════════════════════════════════════════════════════════
     JavaScript for Niche System Integration
═══════════════════════════════════════════════════════════════════════════════ -->

<script>
/**
 * Update niche info card when niche changes
 */
function updateNicheInfoCard() {
  const nicheSelect = document.getElementById('contentNiche');
  const infoCard = document.getElementById('nicheInfoCard');
  const nicheKey = nicheSelect?.value;
  
  if (!nicheKey || nicheKey === 'auto') {
    if (infoCard) infoCard.style.display = 'none';
    return;
  }
  
  const config = NICHE_DATABASE[nicheKey];
  if (!config) {
    if (infoCard) infoCard.style.display = 'none';
    return;
  }
  
  // Show card
  if (infoCard) infoCard.style.display = 'block';
  
  // Update title
  const titleEl = document.getElementById('nicheInfoTitle');
  if (titleEl) titleEl.textContent = `${config.icon} ${config.name}`;
  
  // Update tier badge
  const tierBadge = document.getElementById('nicheTierBadge');
  if (tierBadge) {
    tierBadge.textContent = config.tier === 'core' ? '⭐ Core' : '📦 Extended';
    tierBadge.className = config.tier === 'core' ? 'tier-badge-core' : 'tier-badge-extended';
  }
  
  // Update top styles
  const topStylesEl = document.getElementById('nicheTopStyles');
  if (topStylesEl) {
    topStylesEl.textContent = config.topStyles.slice(0, 3).join(', ');
  }
  
  // Update color mood
  const colorMoodEl = document.getElementById('nicheColorMood');
  const defaultPalette = config.colorPalettes[config.defaultPalette];
  if (colorMoodEl && defaultPalette) {
    colorMoodEl.textContent = defaultPalette.name;
  }
  
  // Update color swatches
  const swatchesEl = document.getElementById('nicheColorSwatches');
  if (swatchesEl && defaultPalette) {
    swatchesEl.innerHTML = defaultPalette.colors
      .map(color => `<span class="color-swatch" style="background: ${color};"></span>`)
      .join('');
  }
  
  // Update style rankings for this niche
  updateNicheRankings(nicheKey);
  
  // Update style preview
  updateStylePreview();
}

/**
 * Auto-detect niche from current script content
 */
function autoDetectNiche() {
  const topicEl = document.getElementById('veoTopic');
  const content = topicEl?.value || '';
  
  if (content.length < 20) {
    veoLog('⚠️ Need more content to auto-detect niche', 'warn');
    return;
  }
  
  const suggestion = suggestStyleUniversal(content, null);
  
  if (suggestion.detectedNiche) {
    const nicheSelect = document.getElementById('contentNiche');
    if (nicheSelect) {
      nicheSelect.value = suggestion.detectedNiche;
      updateNicheInfoCard();
      veoLog(`🎯 Auto-detected niche: ${suggestion.detectedNiche} (${suggestion.nicheConfidence}% confidence)`, 'success');
    }
  } else {
    veoLog('🤖 Could not detect specific niche. Using content-based style suggestion.', 'info');
  }
  
  // Also auto-suggest style
  autoApplyStyleSuggestion(content);
}

// Event Listeners
document.addEventListener('DOMContentLoaded', () => {
  // Niche change
  const nicheSelect = document.getElementById('contentNiche');
  if (nicheSelect) {
    nicheSelect.addEventListener('change', () => {
      const value = nicheSelect.value;
      
      if (value === 'auto') {
        autoDetectNiche();
      } else {
        updateNicheInfoCard();
      }
    });
  }
  
  // Auto-detect link
  const autoDetectLink = document.getElementById('nicheAutoDetect');
  if (autoDetectLink) {
    autoDetectLink.addEventListener('click', autoDetectNiche);
  }
  
  // Topic change - suggest style
  const topicEl = document.getElementById('veoTopic');
  if (topicEl) {
    topicEl.addEventListener('blur', () => {
      const content = topicEl.value;
      if (content.length >= 50) {
        autoApplyStyleSuggestion(content);
      }
    });
  }
  
  // Initial update
  updateNicheInfoCard();
});
</script>
